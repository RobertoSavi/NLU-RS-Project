# configs/parts/1a2.yaml

part: 1A2-DROPOUT
description: >-
  Adding two dropout layers to the LSTM model:
  one after the embedding layer and one before the final linear layer.

# The grid of parameters to try when testing == true
parameters:
  n_epochs: [100]
  patience_value: [5]
  hid_size: [300, 400]
  emb_size: [300, 400]
  emb_dropout: [0.1, 0.3, 0.5]
  out_dropout: [0.1, 0.3, 0.5]
  optimizer: ["SGD"]
  lr: [0.1, 0.5]
  clip: [5.0]
  train_batch_size: [64]
  eval_batch_size: [128]

# The fixed parameters to use when testing == false
best_parameters:
  n_epochs: 100
  patience_value: 5
  hid_size: 400
  emb_size: 400
  emb_dropout: 0.3
  out_dropout: 0.3
  optimizer: "SGD"
  lr: 0.5
  clip: 5.0
  train_batch_size: 64
  eval_batch_size: 128